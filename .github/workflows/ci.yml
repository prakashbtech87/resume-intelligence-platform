name: CI Pipeline

on:
  push:
    branches: [ main, master, devel ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build and Test Backend (Maven)
        run: |
          if [ -f pom.xml ]; then
            mvn -B clean verify
          elif [ -f backend/pom.xml ]; then
            cd backend && mvn -B clean verify
          else
            echo "No backend pom.xml found. Skipping."
          fi

      - name: Run Backend Integration Tests
        run: |
          if [ -f pom.xml ]; then
            mvn -B failsafe:integration-test
          elif [ -f backend/pom.xml ]; then
            cd backend && mvn -B failsafe:integration-test
          else
            echo "No backend integration tests configuration found. Skipping."
          fi

      - name: Install Frontend Dependencies & Lint (React)
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run lint --if-present
            npm test --if-present
          elif [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npm run lint --if-present
            npm test --if-present
          else
            echo "No frontend package.json found. Skipping."
          fi

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Code Quality Scan Placeholder
        run: |
          echo "Running code quality & static analysis scans..."

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Build Check
        run: |
          if [ -f Dockerfile ]; then
            docker build . -t resume-intelligence-platform:latest
          elif [ -f backend/Dockerfile ]; then
            cd backend && docker build . -t resume-intelligence-backend:latest
          else
            echo "No Dockerfile found. Performing dry-run or skipping."
          fi
