name: Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run Maven quality checks
        run: mvn -f backend/pom.xml verify -DskipTests
